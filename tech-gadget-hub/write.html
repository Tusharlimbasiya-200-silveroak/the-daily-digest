<!DOCTYPE html>
<html lang="en-US" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Story — The Daily Digest</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
    /* Editor-specific styles */
    .editor-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:var(--bg);}
    .editor-nav-left{display:flex;align-items:center;gap:12px;}
    .editor-nav-right{display:flex;align-items:center;gap:8px;}
    .draft-status{font-family:var(--font-sans);font-size:13px;color:var(--text-muted);}
    .publish-btn{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-family:var(--font-sans);font-size:14px;font-weight:600;cursor:pointer;}
    .publish-btn:hover{background:var(--accent-hover);}
    .more-btn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-secondary);padding:4px 8px;}
    .editor-container{max-width:740px;margin:0 auto;padding:40px 20px 120px;}
    .editor-title{font-family:var(--font-serif);font-size:42px;font-weight:700;line-height:1.2;letter-spacing:-0.011em;border:none;outline:none;width:100%;color:var(--text);min-height:52px;}
    .editor-title:empty::before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none;}
    .editor-subtitle{font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--text-secondary);border:none;outline:none;width:100%;margin-top:8px;min-height:32px;}
    .editor-subtitle:empty::before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none;}
    .editor-divider{height:1px;background:var(--border);margin:24px 0;}
    .editor-body{font-family:var(--font-serif);font-size:21px;line-height:1.78;letter-spacing:-0.003em;min-height:400px;border:none;outline:none;color:var(--text);word-break:break-word;}
    .editor-body:empty::before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none;}
    .editor-body h2{font-family:var(--font-sans);font-size:26px;font-weight:700;margin:40px 0 10px;}
    .editor-body h3{font-family:var(--font-sans);font-size:22px;font-weight:600;margin:32px 0 8px;}
    .editor-body blockquote{border-left:3px solid var(--text);padding:4px 0 4px 20px;font-style:italic;margin:24px 0;}
    .editor-body pre{background:var(--bg-secondary);padding:16px 20px;border-radius:8px;font-family:var(--font-mono);font-size:14px;overflow-x:auto;margin:20px 0;}
    .editor-body img{max-width:100%;border-radius:8px;margin:20px auto;display:block;}

    /* Floating toolbar */
    .editor-toolbar{display:none;position:absolute;background:var(--text);border-radius:6px;padding:4px;gap:2px;z-index:60;box-shadow:var(--shadow-lg);}
    .editor-toolbar.visible{display:flex;}
    .toolbar-btn{width:36px;height:36px;background:none;border:none;color:var(--bg);cursor:pointer;border-radius:4px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);}
    .toolbar-btn:hover{background:rgba(255,255,255,0.15);}
    .toolbar-btn.active{background:rgba(255,255,255,0.25);}
    .toolbar-sep{width:1px;background:rgba(255,255,255,0.2);margin:4px 2px;}

    /* Side toolbar (+ button) */
    .side-toolbar{position:absolute;left:-48px;display:none;flex-direction:column;gap:4px;z-index:55;}
    .side-toolbar.visible{display:flex;}
    .side-add-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
    .side-add-btn:hover{color:var(--text);border-color:var(--text);}
    .side-menu{display:none;position:absolute;left:44px;top:0;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 0;box-shadow:var(--shadow-lg);min-width:200px;}
    .side-menu.visible{display:block;}
    .side-menu-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-family:var(--font-sans);font-size:14px;color:var(--text);cursor:pointer;white-space:nowrap;}
    .side-menu-item:hover{background:var(--bg-secondary);}
    .side-menu-item span.icon{font-size:18px;width:24px;text-align:center;}

    /* Publish modal */
    .publish-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-start;padding-top:10vh;}
    .publish-modal.visible{display:flex;}
    .publish-modal-inner{background:var(--bg-card);border-radius:12px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto;padding:32px;}
    .publish-modal h2{font-family:var(--font-sans);font-size:22px;font-weight:700;margin-bottom:20px;}
    .publish-field{margin-bottom:20px;}
    .publish-field label{display:block;font-family:var(--font-sans);font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text);}
    .publish-field input,.publish-field textarea,.publish-field select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font-sans);background:var(--bg);color:var(--text);}
    .publish-field textarea{min-height:80px;resize:vertical;}
    .tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:8px;min-height:44px;align-items:center;}
    .tag-input-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg-secondary);border-radius:16px;font-family:var(--font-sans);font-size:13px;}
    .tag-input-tag button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text-muted);padding:0;}
    .tag-input-field{border:none;outline:none;flex:1;min-width:100px;font-family:var(--font-sans);font-size:14px;background:transparent;color:var(--text);}
    .publish-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;}
    .publish-cancel{padding:8px 20px;background:none;border:1px solid var(--border);border-radius:20px;font-family:var(--font-sans);font-size:14px;cursor:pointer;color:var(--text);}

    /* Word count bar */
    .editor-status{position:fixed;bottom:0;left:0;right:0;padding:8px 24px;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:var(--font-sans);font-size:12px;color:var(--text-muted);z-index:40;}
    </style>
</head>
<body>
    <!-- Editor Navigation -->
    <nav class="editor-nav">
        <div class="editor-nav-left">
            <a href="index.html" class="medium-logo" style="text-decoration:none;">
                <span class="logo-icon">📖</span>
                <span class="logo-text">The Daily Digest</span>
            </a>
            <span class="draft-status" id="draftStatus">Draft</span>
        </div>
        <div class="editor-nav-right">
            <button class="publish-btn" onclick="openPublishModal()">Publish</button>
            <button class="more-btn" title="More options">⋯</button>
        </div>
    </nav>

    <!-- Floating Format Toolbar -->
    <div class="editor-toolbar" id="editorToolbar">
        <button class="toolbar-btn" onclick="execFmt('bold')" title="Bold"><b>B</b></button>
        <button class="toolbar-btn" onclick="execFmt('italic')" title="Italic"><i>I</i></button>
        <button class="toolbar-btn" onclick="execFmt('underline')" title="Underline"><u>U</u></button>
        <button class="toolbar-btn" onclick="execFmt('strikeThrough')" title="Strikethrough"><s>S</s></button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="execBlock('h2')" title="Heading 2">H2</button>
        <button class="toolbar-btn" onclick="execBlock('h3')" title="Heading 3">H3</button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="execFmt('insertUnorderedList')" title="Bullet list">•</button>
        <button class="toolbar-btn" onclick="execFmt('insertOrderedList')" title="Numbered list">1.</button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="insertBlockquote()" title="Quote">❝</button>
        <button class="toolbar-btn" onclick="insertLink()" title="Link">🔗</button>
        <button class="toolbar-btn" onclick="insertCodeBlock()" title="Code">&lt;/&gt;</button>
    </div>

    <!-- Editor Container -->
    <div class="editor-container">
        <!-- Title -->
        <div class="editor-title" contenteditable="true" data-placeholder="Title" id="editorTitle" role="textbox" aria-label="Story title"></div>

        <!-- Subtitle -->
        <div class="editor-subtitle" contenteditable="true" data-placeholder="Subtitle (optional)" id="editorSubtitle" role="textbox" aria-label="Story subtitle"></div>

        <div class="editor-divider"></div>

        <!-- Body with side toolbar -->
        <div style="position:relative;">
            <!-- Side + Button -->
            <div class="side-toolbar" id="sideToolbar">
                <button class="side-add-btn" onclick="toggleSideMenu()" title="Add content">+</button>
                <div class="side-menu" id="sideMenu">
                    <div class="side-menu-item" onclick="insertImage()"><span class="icon">🖼️</span> Image</div>
                    <div class="side-menu-item" onclick="insertDivider()"><span class="icon">—</span> Divider</div>
                    <div class="side-menu-item" onclick="insertCodeBlock()"><span class="icon">💻</span> Code block</div>
                    <div class="side-menu-item" onclick="insertEmbed('youtube')"><span class="icon">▶️</span> YouTube embed</div>
                    <div class="side-menu-item" onclick="insertEmbed('twitter')"><span class="icon">𝕏</span> Twitter/X embed</div>
                    <div class="side-menu-item" onclick="insertEmbed('gist')"><span class="icon">📋</span> GitHub Gist</div>
                    <div class="side-menu-item" onclick="insertTipBox()"><span class="icon">💡</span> Tip box</div>
                    <div class="side-menu-item" onclick="insertCallout('example')"><span class="icon">📌</span> Example box</div>
                    <div class="side-menu-item" onclick="insertCallout('takeaway')"><span class="icon">🎯</span> Key takeaway</div>
                </div>
            </div>

            <!-- Editable Body -->
            <div class="editor-body" contenteditable="true" data-placeholder="Tell your story..." id="editorBody" role="textbox" aria-label="Story body"></div>
        </div>
    </div>

    <!-- Publish Modal -->
    <div class="publish-modal" id="publishModal">
        <div class="publish-modal-inner">
            <h2>Story Preview</h2>

            <div class="publish-field">
                <label>Preview subtitle</label>
                <input type="text" id="pubSubtitle" placeholder="Write a preview subtitle...">
            </div>

            <div class="publish-field">
                <label>Publication</label>
                <select id="pubSelect">
                    
                    <option value="tech-gadget-hub">💻 Tech Gadget Hub</option>
                    
                    <option value="health-wellness-daily">🏃 Health &amp; Wellness Daily</option>
                    
                    <option value="smart-money-guide">💰 Smart Money Guide</option>
                    
                    <option value="usa-travel-explorer">✈️ USA Travel Explorer</option>
                    
                    <option value="recipe-kitchen-usa">🍳 Recipe Kitchen USA</option>
                    
                    <option value="usa-news-digest">📰 USA News Digest</option>
                    
                </select>
            </div>

            <div class="publish-field">
                <label>Tags (up to 5)</label>
                <div class="tag-input-wrap" id="tagWrap">
                    <input type="text" class="tag-input-field" id="tagInput" placeholder="Add a tag..." maxlength="30">
                </div>
                <span style="font-size:12px;color:var(--text-muted);">Press Enter to add. Max 5 tags.</span>
            </div>

            <div class="publish-field">
                <label>SEO Description</label>
                <textarea id="pubDesc" placeholder="A short description for search engines (max 160 chars)" maxlength="160"></textarea>
            </div>

            <div class="publish-field">
                <label>Visibility</label>
                <select id="pubVisibility">
                    <option value="public">Public — visible to everyone</option>
                    <option value="unlisted">Unlisted — only with link</option>
                    <option value="metered">Member-only — behind paywall</option>
                </select>
            </div>

            <div class="publish-field">
                <label>Series (optional)</label>
                <input type="text" id="pubSeries" placeholder="Series name (e.g., 'React Masterclass')">
            </div>

            <div class="publish-actions">
                <button class="publish-cancel" onclick="closePublishModal()">Cancel</button>
                <button class="publish-btn" onclick="publishStory()">Publish now</button>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="editor-status">
        <span id="wordCount">0 words · 0 min read</span>
        <span id="autoSaveStatus">Auto-saved</span>
    </div>

    <script>
    var body=document.getElementById('editorBody'),title=document.getElementById('editorTitle'),toolbar=document.getElementById('editorToolbar');
    var editorTags=[];

    /* Format commands */
    function execFmt(cmd){document.execCommand(cmd,false,null);body.focus();}
    function execBlock(tag){
        var sel=window.getSelection();if(!sel.rangeCount)return;
        var node=sel.anchorNode;if(node.nodeType===3)node=node.parentNode;
        if(node.tagName&&node.tagName.toLowerCase()===tag){
            document.execCommand('formatBlock',false,'p');
        }else{document.execCommand('formatBlock',false,tag);}
        body.focus();
    }

    /* Floating toolbar on selection */
    body.addEventListener('mouseup',function(){
        var sel=window.getSelection();
        if(sel.toString().trim().length>0){
            var r=sel.getRangeAt(0).getBoundingClientRect();
            toolbar.style.top=(r.top+window.scrollY-48)+'px';
            toolbar.style.left=(r.left+(r.width/2)-toolbar.offsetWidth/2)+'px';
            toolbar.classList.add('visible');
        }else toolbar.classList.remove('visible');
    });
    document.addEventListener('mousedown',function(e){
        if(!toolbar.contains(e.target))toolbar.classList.remove('visible');
    });

    /* Side toolbar positioning */
    body.addEventListener('keyup',positionSideToolbar);
    body.addEventListener('click',positionSideToolbar);
    function positionSideToolbar(){
        var sel=window.getSelection();if(!sel.rangeCount)return;
        var node=sel.anchorNode;if(node===body||node.parentNode===body){
            var st=document.getElementById('sideToolbar');
            var r;
            if(node.nodeType===1&&node.getBoundingClientRect){r=node.getBoundingClientRect();}
            else if(sel.rangeCount){r=sel.getRangeAt(0).getBoundingClientRect();}
            if(r&&r.top){st.style.top=(r.top-body.getBoundingClientRect().top)+'px';st.classList.add('visible');}
        }else{document.getElementById('sideToolbar').classList.remove('visible');}
        document.getElementById('sideMenu').classList.remove('visible');
    }
    function toggleSideMenu(){document.getElementById('sideMenu').classList.toggle('visible');}

    /* Insert blocks */
    function insertImage(){
        var url=prompt('Image URL:');
        if(url){document.execCommand('insertHTML',false,'<figure class="article-image"><img src="'+url+'" alt="Image" loading="lazy" width="800" height="450"><figcaption>Add a caption</figcaption></figure><p></p>');closeSide();}
    }
    function insertDivider(){document.execCommand('insertHTML',false,'<hr><p></p>');closeSide();}
    function insertCodeBlock(){document.execCommand('insertHTML',false,'<pre><code class="language-javascript">// Your code here</code></pre><p></p>');closeSide();}
    function insertBlockquote(){document.execCommand('insertHTML',false,'<blockquote><p>Type your quote here...</p></blockquote><p></p>');}
    function insertLink(){
        var url=prompt('Link URL:');
        if(url)document.execCommand('createLink',false,url);
    }
    function insertEmbed(type){
        var id=prompt(type==='youtube'?'YouTube video ID:':type==='twitter'?'Tweet ID:':'Gist ID (user/id):');
        if(!id)return;
        var html='';
        if(type==='youtube')html='<div class="embed-wrap embed-youtube"><iframe src="https://www.youtube.com/embed/'+id+'" width="680" height="382" frameborder="0" allowfullscreen loading="lazy" title="YouTube video"></iframe></div>';
        else if(type==='twitter')html='<div class="embed-wrap embed-twitter"><blockquote class="twitter-tweet"><a href="https://twitter.com/i/status/'+id+'">View Tweet</a></blockquote></div>';
        else if(type==='gist')html='<div class="embed-wrap embed-gist"><script src="https://gist.github.com/'+id+'.js"><\/script></div>';
        document.execCommand('insertHTML',false,html+'<p></p>');closeSide();
    }
    function insertTipBox(){document.execCommand('insertHTML',false,'<div class="tip-box"><strong>💡 Pro Tip:</strong> Your tip here</div><p></p>');closeSide();}
    function insertCallout(type){
        var icon=type==='example'?'📌 Real-Life Example:':'🎯 Key Takeaway:';
        var cls=type==='example'?'example-box':'key-takeaway';
        document.execCommand('insertHTML',false,'<div class="'+cls+'"><strong>'+icon+'</strong> Your content here</div><p></p>');closeSide();
    }
    function closeSide(){document.getElementById('sideMenu').classList.remove('visible');}

    /* Word count */
    function updateWordCount(){
        var text=(body.innerText||'').trim();
        var words=text?text.split(/\s+/).length:0;
        var mins=Math.max(1,Math.round(words/265));
        document.getElementById('wordCount').textContent=words+' words · '+mins+' min read';
    }
    body.addEventListener('input',function(){updateWordCount();autoSave();});
    title.addEventListener('input',autoSave);

    /* Auto-save to localStorage */
    var saveTimer;
    function autoSave(){
        clearTimeout(saveTimer);
        document.getElementById('autoSaveStatus').textContent='Saving...';
        saveTimer=setTimeout(function(){
            var draft={title:title.innerHTML,subtitle:document.getElementById('editorSubtitle').innerHTML,body:body.innerHTML,savedAt:new Date().toISOString()};
            localStorage.setItem('medium_draft',JSON.stringify(draft));
            document.getElementById('autoSaveStatus').textContent='Saved';
            document.getElementById('draftStatus').textContent='Draft saved';
        },1000);
    }

    /* Restore draft */
    (function(){
        var d=localStorage.getItem('medium_draft');
        if(d){try{d=JSON.parse(d);if(d.title)title.innerHTML=d.title;if(d.subtitle)document.getElementById('editorSubtitle').innerHTML=d.subtitle;if(d.body)body.innerHTML=d.body;updateWordCount();}catch(e){}}
    })();

    /* Tags */
    document.getElementById('tagInput').addEventListener('keydown',function(e){
        if(e.key==='Enter'){
            e.preventDefault();
            var v=this.value.trim();
            if(v&&editorTags.length<5&&editorTags.indexOf(v)<0){
                editorTags.push(v);renderTags();
            }
            this.value='';
        }
    });
    function renderTags(){
        var wrap=document.getElementById('tagWrap');
        wrap.querySelectorAll('.tag-input-tag').forEach(function(t){t.remove();});
        var input=document.getElementById('tagInput');
        editorTags.forEach(function(tag,i){
            var el=document.createElement('span');el.className='tag-input-tag';
            el.innerHTML=tag+' <button onclick="removeTag('+i+')">&times;</button>';
            wrap.insertBefore(el,input);
        });
    }
    function removeTag(i){editorTags.splice(i,1);renderTags();}

    /* Publish modal */
    function openPublishModal(){document.getElementById('publishModal').classList.add('visible');document.getElementById('pubSubtitle').value=document.getElementById('editorSubtitle').innerText||'';}
    function closePublishModal(){document.getElementById('publishModal').classList.remove('visible');}
    function publishStory(){
        var story={
            title:title.innerText,
            subtitle:document.getElementById('pubSubtitle').value,
            content:body.innerHTML,
            publication:document.getElementById('pubSelect').value,
            tags:editorTags,
            meta_description:document.getElementById('pubDesc').value,
            visibility:document.getElementById('pubVisibility').value,
            series:document.getElementById('pubSeries').value,
            published_at:new Date().toISOString()
        };
        localStorage.setItem('medium_published_'+Date.now(),JSON.stringify(story));
        localStorage.removeItem('medium_draft');
        alert('Story published! (saved locally — deploy pipeline will pick it up)');
        closePublishModal();
        document.getElementById('draftStatus').textContent='Published ✓';
    }

    /* Keyboard shortcuts */
    document.addEventListener('keydown',function(e){
        if(e.ctrlKey||e.metaKey){
            if(e.key==='b'){e.preventDefault();execFmt('bold');}
            if(e.key==='i'){e.preventDefault();execFmt('italic');}
            if(e.key==='u'){e.preventDefault();execFmt('underline');}
            if(e.key==='k'){e.preventDefault();insertLink();}
        }
    });
    </script>
</body>
</html>
